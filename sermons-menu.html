  .playlist-arrow { font-size:20px; }
  .footer-banner { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:#1d4f7a; padding:10px 0; }
  .banner-row { display:flex; justify-content:center; gap:8px; margin:4px 0; }
  .banner-row div { background:rgba(255,255,255,0.15); padding:10px 16px; border-radius:6px; font-weight:bold; cursor:pointer; color:white; }
