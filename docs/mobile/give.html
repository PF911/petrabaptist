<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Give | Petra Baptist Church</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #2e6aa9, #338cd0);
  min-height: 100vh;
  color: #fff;
}

.app-frame {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 160px;
}

/* Logo */
.logo-bar {
  padding: 10px 0 6px;
  text-align: center;
  flex-shrink: 0;
}

.logo-bar img {
  width: 80%;
  max-width: 300px;
  height: auto;
}

/* Center content */
.wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  background: #fff;
  color: #2e6aa9;
  width: 100%;
  max-width: 360px;
  border-radius: 18px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.card h2 {
  margin: 0 0 10px;
  font-size: 22px;
  color: #1d4f7a;
}

.card p {
  margin: 0 0 28px;
  font-size: 15px;
  color: #555;
  line-height: 1.6;
}

.give-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: #2e6aa9;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s;
}

.give-btn:active {
  background: #1d4f7a;
}

.note {
  margin-top: 16px;
  font-size: 12px;
  color: #999;
}

/* Footer banner */
.footer-banner {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  background: #1d4f7a;
  box-shadow: 0 -3px 8px rgba(0,0,0,0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  z-index: 100;
}

.banner-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 4px 0;
}

.banner-row div {
  background: rgba(255,255,255,0.15);
  border-radius: 6px;
  padding: 10px 16px;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
  color: white;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  transition: background 0.3s, box-shadow 0.3s;
}

.banner-row div:hover { background: rgba(255,255,255,0.3); }

.banner-row div.active {
  background: rgba(255,255,255,0.6);
  color: #1d4f7a;
  box-shadow: 0 0 12px rgba(255,255,255,0.9);
}

.banner-row div.home-btn {
  flex: 2.2;
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.5);
}

@media (max-width: 480px) {
  .banner-row div { font-size: 14px; padding: 8px 10px; }
}
</style>
</head>

<body>

<div class="app-frame">

  <div class="logo-bar">
    <img src="img/logo2.png" alt="Petra Baptist Church Logo" onerror="this.style.display='none'">
  </div>

  <div class="wrapper">
    <div class="card">
      <h2>Support Petra Baptist</h2>
      <p>Your generosity makes a difference. Thank you for giving to the ministry of Petra Baptist Church.</p>
      <a class="give-btn" href="https://petrabaptistchurch.flocknote.com/give" target="_blank" rel="noopener noreferrer">
        Give Online
      </a>
      <div class="note">Opens securely in your browser</div>
    </div>
  </div>

</div>

<!-- Footer Nav -->
<div class="footer-banner">
  <div class="banner-row">
    <div onclick="window.location.href='sermons.html'">Sermons</div>
    <div class="home-btn" onclick="window.location.href='index.html'">Home</div>
    <div onclick="window.location.href='bibles.html'">Bibles</div>
  </div>
  <div class="banner-row">
    <div onclick="window.location.href='ministries.html'">Ministries</div>
    <div onclick="window.location.href='flocknotes.html'">Flocknotes</div>
    <div onclick="window.location.href='prayer.html'">Prayer</div>
    <div class="active" onclick="window.location.href='give.html'">Give</div>
  </div>
  <div class="banner-row">
    <div onclick="window.location.href='facebook.html'">Facebook</div>
    <div onclick="window.location.href='contact.html'">Contact</div>
    <div onclick="window.location.href='events.html'">Events</div>
    <div onclick="window.location.href='songs.html'">Songs</div>
  </div>
</div>

</body>
</html>
