<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flocknote | Petra Baptist Church</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
  }

  .page-background {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(to bottom, #2e6aa9, #338cd0);
    z-index: 0;
  }

  .app-frame {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-bar {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    padding-top: 10px;
    z-index: 50;
  }

  .logo-bar img {
    width: 80%;
    max-width: 300px;
    height: auto;
  }

  .content-area {
    position: absolute;
    top: 100px;
    bottom: 160px;
    left: 0;
    right: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .flocknote-box {
    background: rgba(255,255,255,0.95);
    border-radius: 15px;
    padding: 30px;
    max-width: 350px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  }

  .flocknote-box h1 {
    color: #2e6aa9;
    margin-top: 0;
    font-size: 24px;
  }

  .flocknote-box p {
    color: #333;
    font-size: 16px;
    line-height: 1.5;
  }

  .flocknote-button {
    background: #2e6aa9;
    color: white;
    border-radius: 10px;
    padding: 14px 26px;
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    transition: 0.3s ease;
  }

  .flocknote-button:hover {
    background: #1d4f7a;
    transform: scale(1.05);
  }

  .footer-banner {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: #1d4f7a;
    padding: 10px 0;
    box-shadow: 0 -3px 8px rgba(0,0,0,0.35);
    z-index: 100;
  }

  .banner-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin: 4px 0;
  }

  .banner-row a {
    background: rgba(255,255,255,0.15);
    padding: 10px 16px;
    border-radius: 6px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    text-decoration: none;
    white-space: nowrap;
    transition: 0.3s ease;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
  }

  .banner-row a:hover {
    background: rgba(255,255,255,0.3);
  }

  .active {
    background: rgba(255,255,255,0.6) !important;
    color: #1d4f7a !important;
    box-shadow: 0 0 12px rgba(255,255,255,0.9);
  }
</style>

</head>

<body>

<div class="page-background"></div>

<div class="app-frame">

  <!-- Logo -->
  <div class="logo-bar">
    <img src="img/logo2.png" alt="Petra Baptist Church Logo">
  </div>

  <!-- Main Content -->
  <div class="content-area">
    <div class="flocknote-box">
      <h1>📬 Flocknote</h1>
      <p>
        Stay connected with Petra Baptist Church.<br>
        Get updates, announcements, prayer needs, and more.
      </p>

      <a class="flocknote-button"
         href="https://petrabaptistchurch.flocknote.com"
         target="_blank">
        Open Flocknote
      </a>

    </div>
  </div>

  <!-- Footer Navigation -->
  <div class="footer-banner">

    <div class="banner-row">
      <a href="index.html">Home</a>
      <a href="sermons.html">Sermons</a>
      <a href="prayer.html">Prayer</a>
    </div>

    <div class="banner-row">
      <a href="bibles.html">Bibles</a>
      <a href="contact.html">Contact</a>
      <a href="facebook.html">Facebook</a>
    </div>

    <div class="banner-row">
      <a href="flocknotes.html" class="active">Flocknotes</a>
      <a href="events.html">Events</a>
      <a href="website.html">Website</a>
    </div>

  </div>

</div>

</body>
</html>
