<ion-view sb-page-background
          class="module-fanwall fanwall-list fanwall-list-l1">

    <ion-nav-title>{{ page_title }}</ion-nav-title>
    
    
    <ion-nav-buttons side="primary">
        
        <button ng-click="goHome()" title='{{ ::"home" | translate:"socialnetworks" }}'
                class="button button-clear header-item">
            <i class="icon ion-ios-home "></i>
        </button>
    </ion-nav-buttons>

    <ion-nav-buttons side="secondary">
        
        <button ng-click="iframeGoBack()" title='{{ ::"Back" | translate:"socialnetworks" }}'
                class="button qrscanner back button-clear header-item">
            <i class="icon ion-ios-arrow-back "></i>
        </button>
    </ion-nav-buttons>

   
    
    
    <ion-content class="sourcecode-view" overflow-scroll="true">
        <iframe id="qrscanner-iframe"   data-value-id="{{ value_id }}" ng-src="{{ url }}"  ng-if="url" width="100%" height="100%" onload="frameLoaded()" ></iframe>
    </ion-content>

    
    
   
    
</ion-view>
