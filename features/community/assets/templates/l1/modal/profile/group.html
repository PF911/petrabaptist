<ion-modal-view sb-page-background
                ng-controller="CommunityGroupModalController"
                class="community-view">

    <ion-header-bar class="bar-custom">
        <div class="buttons">
            <button class="button button-clear"
                    ng-click="close()">
                <i class="icon ion-android-arrow-back"></i>
            </button>
        </div>
        <h1 class="title">{{ ::"Groups"| translate:"community" }}</h1>

    </ion-header-bar>

    <ion-content class="grp-bg">
        
            <community-group-item></community-group-item>

        
    </ion-content>
</ion-modal-view>
