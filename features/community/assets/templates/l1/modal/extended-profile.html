<ion-modal-view sb-page-background 
                class="community-view commu-signup" ng-controller="CommunityModalController">

    <ion-header-bar class="bar-custom">
        <div class="buttons">
            <button class="button button-clear"
                    ng-click="close()">
                <i class="icon ion-android-arrow-back"></i>
            </button>
        </div>
        <h1 class="title">{{ section.name}}</h1>
    </ion-header-bar>

    <ion-content ng-show="modalReady">
        <div class="loader"
             ng-show="is_loading">
            <ion-spinner class="spinner-custom"></ion-spinner>
        </div>
        <div class="card sign-up profile list">
            
            <community-section-item></community-section-item>

            <button class="button button-full" ng-click="post()">
                <i ng-if="!label_settings.lang_save">{{ ::"SAVE"| translate:"community" }}</i>
                <i ng-if="label_settings.lang_save">{{label_settings.lang_save}}</i>
            </button>
        </div>
        
    </ion-content>
    

</ion-modal-view>
