<ion-modal-view sb-page-background
                class="community-view">

    <ion-header-bar class="bar-custom">
        <div class="buttons">
            <button class="button button-clear"
                    ng-click="close()">
                <i class="icon ion-android-arrow-back"></i>
            </button>
        </div>
        <h1 class="title"></h1>
    </ion-header-bar>

    <ion-content>
        <div style="display: inline;
             margin: 0;
             height: 100%;">
            <img src="{{allImages[activeSlide]}}" alt="" style="display: inline-block;
                 width: auto;
                 height: auto;
                 max-height: 100%;
                 max-width: 100%;
                 vertical-align: middle;">
        </div>
    </ion-content>

</ion-modal-view>
