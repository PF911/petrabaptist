<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sermon Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 10px;
      background: #111;
      border-bottom: 1px solid #222;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
    }

    .back-btn {
      position: absolute;
      left: 10px;
      top: 10px;
      background: #222;
      border: 1px solid #444;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
    }
  </style>

  <script>
    function getQuery(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    function goBack() {
      window.history.back();
    }

    window.onload = function () {
      const playlistId = getQuery("list");
      const title = getQuery("title") || "Sermons";

      document.getElementById("title").innerText = title;

      // Build the YouTube playlist embed URL
      const embedUrl = "https://www.youtube.com/embed?list=" + playlistId;

      document.getElementById("player").src = embedUrl;
    };
  </script>
</head>

<body>
  <div class="header">
    <div class="back-btn" onclick="goBack()">← Back</div>
    <span id="title">Loading…</span>
  </div>

  <iframe id="player" allowfullscreen></iframe>
</body>
</html>
