<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sermon Player</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  overflow:hidden;
}

.header{
  background:#111;
  padding:15px;
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn{
  background:#2f6fa3;
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  font-size:16px;
  font-weight:bold;
  white-space:nowrap;
  flex-shrink:0;
}

.title{
  font-size:16px;
  text-align:center;
  flex:1;
}

iframe{
  width:100%;
  height:calc(100vh - 55px);
  border:none;
  display:block;
}
</style>
</head>

<body>

<div class="header">
  <a href="sermons.html" class="back-btn">← Back</a>
  <div class="title">Petra Baptist Church</div>
</div>

<iframe id="player" allowfullscreen></iframe>

<script>
const playlists = {
  sunday:    "PLw2qfRFieARtMUKDzo5JV42m22JBnp_Ya",
  wednesday: "PLw2qfRFieARvd5oS_rA-qa4q9Au5M4ft0",
  special:   "PLw2qfRFieARuaIVDu9vIK3TuMuqTZBOuQ"
};

const params = new URLSearchParams(location.search);
const key = params.get("pl");
const list = playlists[key];

const embedURL = "https://www.youtube.com/embed/videoseries?list=" + list;
const externalURL = "https://www.youtube.com/playlist?list=" + list;

const iframe = document.getElementById("player");
iframe.src = embedURL;

// Fallback - if YouTube blocks embed
setTimeout(() => {
  try {
    if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
      window.open(externalURL, "_system");
    }
  } catch(e) {
    window.open(externalURL, "_system");
  }
}, 4000);
</script>

</body>
</html>
