<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermon Player</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

.header{
  padding:12px;
  background:#111;
  text-align:center;
  font-size:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:#2f6fa3;
  color:#fff;
  padding:8px 16px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
  font-weight:bold;
}

.back-btn:hover{
  background:#265a8a;
}

.title{
  flex:1;
}

iframe{
  width:100%;
  height:calc(100vh - 48px);
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <a href="sermons.html" class="back-btn">← Back</a>
  <div class="title">Petra Baptist Church</div>
  <div style="width:70px;"></div>
</div>
<iframe id="player" allowfullscreen></iframe>

<script>
const playlists = {
  sunday:    "PLw2qfRFieARtMUKDzo5JV42m22JBnp_Ya",
  wednesday: "PLw2qfRFieARvd5oS_rA-qa4q9Au5M4ft0",
  special:   "PLw2qfRFieARuaIVDu9vIK3TuMuqTZBOuQ"
};

const params = new URLSearchParams(location.search);
const key = params.get("pl");
const list = playlists[key];

const embedURL = "https://www.youtube.com/embed/videoseries?list=" + list;
const externalURL = "https://www.youtube.com/playlist?list=" + list;

const iframe = document.getElementById("player");
iframe.src = embedURL;

// Fallback - if YouTube blocks embed
setTimeout(() => {
  try {
    if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
      window.open(externalURL, "_system");
    }
  } catch(e) {
    window.open(externalURL, "_system");
  }
}, 4000);
</script>

</body>
</html>
