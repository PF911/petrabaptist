<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sermon Player</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<iframe id="player" allowfullscreen></iframe>

<script>
const playlists = {
  sunday: "PLw2qfRFieARtnuv348BgkJ_gJKt-dQleS",
  wednesday: "PLw2qfRFieARvPINGa05dvwgZLeCRdhoWi",
  special: "PLw2qfRFieARvQlLThC8b1xqxQOzTlO5cR"
};

const params = new URLSearchParams(window.location.search);
const key = params.get('list');

if (playlists[key]) {
  document.getElementById('player').src =
    "https://www.youtube.com/embed/videoseries?list=" +
    playlists[key] +
    "&playsinline=1";
} else {
  location.href = "sermons.html";
}
</script>

</body>
</html>
