<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sermon Player</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

.header{
  padding:12px;
  background:#111;
  text-align:center;
  font-size:16px;
}

iframe{
  width:100%;
  height:calc(100vh - 48px);
  border:none;
}
</style>
</head>

<body>

<div class="header">Petra Baptist Church</div>
<iframe id="player" allowfullscreen></iframe>

<script>
const playlists = {
  sunday:    "PLw2qfRFieARtnuv348BgkJ_gJKt-dQleS",
  wednesday:"PLw2qfRFieARvPINGa05dvwgZLeCRdhoWi",
  special:  "PLw2qfRFieARvQlLThC8b1xqxQOzTlO5cR"
};

const params = new URLSearchParams(location.search);
const key = params.get("pl");
const list = playlists[key];

const embedURL = "https://www.youtube.com/embed/videoseries?list=" + list;
const externalURL = "https://www.youtube.com/playlist?list=" + list;

const iframe = document.getElementById("player");
iframe.src = embedURL;

// FALLBACK — if YouTube blocks embed
setTimeout(() => {
  try {
    if (!iframe.contentWindow || iframe.contentWindow.length === 0) {
      window.open(externalURL, "_system");
    }
  } catch(e) {
    window.open(externalURL, "_system");
  }
}, 4000);
</script>

</body>
</html>
