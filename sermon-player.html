<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sermon Player</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
}

iframe {
  width: 100%;
  height: 100%;
  border: 0;
}
</style>
</head>

<body>

<iframe id="player"
  allow="autoplay; encrypted-media; fullscreen"
  allowfullscreen>
</iframe>

<script>
/*
  Petra Baptist Church
  Dynamic Sermon Player
*/

const playlists = {
  sunday: "PLw2qfRFieARtnuv348BgkJ_gJKt-dQleS",
  wednesday: "PLw2qfRFieARvPINGa05dvwgZLeCRdhoWi",
  special: "PLw2qfRFieARvQlLThC8b1xqxQOzTlO5cR"
};

const params = new URLSearchParams(window.location.search);
const key = params.get("pl");

if (playlists[key]) {
  document.getElementById("player").src =
    "https://www.youtube.com/embed/videoseries?list=" + playlists[key];
} else {
  document.body.innerHTML =
    "<p style='color:white;text-align:center;margin-top:40vh;font-family:Arial;'>No sermon playlist selected</p>";
}
</script>

</body>
</html>
