<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sermon Playlist | Petra Baptist Church</title>

<style>
  body { margin:0; font-family:Arial; color:white; text-align:center; overflow:hidden; }
  .page-background { position:fixed; top:0; left:0; width:100%; height:100%;
    background:linear-gradient(to bottom,#2e6aa9,#338cd0); }
  .app-frame { position:relative; z-index:1; width:100%; max-width:420px; margin:0 auto;
    height:100vh; display:flex; flex-direction:column; }

  .logo-bar { position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%;
    max-width:420px; padding-top:10px; }
  .logo-bar img { width:80%; max-width:300px; }

  .content-area {
    position:absolute; top:100px; bottom:160px; left:0; right:0;
    padding:15px; overflow-y:auto; display:flex; flex-direction:column; gap:15px;
  }

  .page-title { font-size:20px; font-weight:bold; }
  .back-link { font-size:13px; text-decoration:underline; cursor:pointer; }

  .sermon-item {
    background:white; color:#0f3f7a; padding:14px;
    border-radius:10px; border:2px solid #0f3f7a;
    font-weight:bold; text-align:left;
    cursor:pointer; display:flex; justify-content:space-between;
  }

  .footer-banner {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:420px; background:#1d4f7a; padding:10px 0;
  }

  .banner-row {
    display:flex; justify-content:center; gap:8px; margin:4px 0;
  }

  .banner-row div {
    background:rgba(255,255,255,0.15); padding:10px 16px; border-radius:6px;
    font-weight:bold; cursor:pointer; font-size:16px; color:white;
  }

  .active { background:rgba(255,255,255,0.6) !important; color:#1d4f7a !important; }
</style>

<script>
function getParam(key) {
  return new URL(window.location.href).searchParams.get(key);
}

// You can replace these later with real titles + IDs
const sermons = [
  { title: "Daniel Part 6", id: "K0EF56e56No" },
  { title: "Daniel Part 5", id: "fAGcIBwG0qY" },
  { title: "Daniel Part 4", id: "gjXSRIeSOuA" },
  { title: "Daniel Part 3", id: "EdbOcZvFvcU" },
  { title: "Daniel Part 2", id: "Z4__i33kfn4" }
];

document.addEventListener("DOMContentLoaded", function () {
  const plistTitle = getParam("title") || "Playlist";
  document.getElementById("playlist-title").innerText = plistTitle;

  const container = document.getElementById("sermon-list");

  sermons.forEach(s => {
    const div = document.createElement("div");
    div.className = "sermon-item";
    div.innerHTML = `<span>${s.title}</span><span>▶</span>`;
    div.onclick = () => {
      location.href = `sermon-select.html?v=${s.id}&title=${encodeURIComponent(s.title)}`;
    };
    container.appendChild(div);
  });
});
</script>

</head>

<body>
<div class="page-background"></div>

<div class="app-frame">

  <div class="logo-bar"><img src="img/logo2.png"></div>

  <div class="content-area">
    <div id="playlist-title" class="page-title">Playlist</div>
    <div class="back-link" onclick="location.href='sermons-menu.html'">← Back to Playlists</div>

    <div id="sermon-list"></div>
  </div>

  <div class="footer-banner">
    <div class="banner-row">
      <div onclick="location.href='index.html'">Home</div>
      <div class="active">Sermons</div>
      <div onclick="location.href='prayer.html'">Prayer</div>
    </div>
    <div class="banner-row">
      <div onclick="location.href='bibles.html'">Bibles</div>
      <div onclick="location.href='contact.html'">Contact</div>
      <div onclick="location.href='facebook.html'">Facebook</div>
    </div>
    <div class="banner-row">
      <div onclick="location.href='flocknotes.html'">Flocknotes</div>
      <div onclick="location.href='events.html'">Events</div>
      <div onclick="location.href='website.html'">Website</div>
    </div>
  </div>

</div>

</body>
</html>
