<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Petra Baptist Sermons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #000;
      color: #fff;
    }

    .container {
      padding: 10px;
    }

    h1 {
      text-align: center;
      font-size: 1.2rem;
      margin: 6px 0 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #cfcfcf;
      margin-bottom: 10px;
    }

    .playlist-list {
      max-height: calc(100vh - 70px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 10px;
    }

    .playlist-card {
      border-radius: 10px;
      padding: 10px;
      background: #141414;
      border: 1px solid #333;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .playlist-card:hover {
      background: #1e1e1e;
    }

    .playlist-info {
      flex: 1;
      padding-right: 10px;
    }

    .playlist-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .playlist-desc {
      font-size: 0.8rem;
      color: #cccccc;
    }

    .playlist-arrow {
      font-size: 1.2rem;
      opacity: 0.7;
    }
  </style>

  <script>
    function openPlaylist(playlistId, title) {
      // This will navigate (inside the iframe) to the viewer page,
      // passing the playlist ID and title in the URL.
      var url =
        "sermon-viewer.html?list=" +
        encodeURIComponent(playlistId) +
        "&title=" +
        encodeURIComponent(title);

      window.location.href = url;
    }
  </script>
</head>
<body>
  <div class="container">
    <h1>Petra Baptist Sermons</h1>
    <div class="subtitle">Choose a playlist to watch</div>

    <div class="playlist-list">
      <!-- PLAYLIST #1 -->
      <div
        class="playlist-card"
        onclick="openPlaylist('PLAYLIST_ID_1', 'Sunday Morning Sermons')"
      >
        <div class="playlist-info">
          <div class="playlist-title">Sunday Morning Sermons</div>
          <div class="playlist-desc">
            Weekly messages from our Sunday worship services.
          </div>
        </div>
        <div class="playlist-arrow">▶</div>
      </div>

      <!-- PLAYLIST #2 -->
      <div
        class="playlist-card"
        onclick="openPlaylist('PLAYLIST_ID_2', 'Bible Study Series')"
      >
        <div class="playlist-info">
          <div class="playlist-title">Bible Study Series</div>
          <div class="playlist-desc">
            In-depth verse-by-verse teaching and study.
          </div>
        </div>
        <div class="playlist-arrow">▶</div>
      </div>

      <!-- PLAYLIST #3 -->
      <div
        class="playlist-card"
        onclick="openPlaylist('PLAYLIST_ID_3', 'Special Messages & Events')"
      >
        <div class="playlist-info">
          <div class="playlist-title">Special Messages &amp; Events</div>
          <div class="playlist-desc">
            Conferences, guest speakers, and special services.
          </div>
        </div>
        <div class="playlist-arrow">▶</div>
      </div>

      <!-- You can copy/paste another block like the ones above for more playlists -->
    </div>
  </div>
</body>
</html>
